<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>اختبار تفاعلي فاخر - الثاني عشر | مدرسة الشحانية</title>
<style>
:root{--maroon:#8a1538;--gold:#d8b45b;--navy:#071a3a;--navy2:#0d2a57;--ok:#1fd287;--bad:#ff4766;--text:#fff8ee;--muted:#d7d9e8}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:"Tajawal","Cairo","Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top right,#9d1742 0,#071a3a 42%,#020713 100%);color:var(--text);overflow:hidden}body:before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 25%,rgba(216,180,91,.08));pointer-events:none}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-columns:330px 1fr;gap:14px;padding:14px}.side{border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.15),rgba(255,255,255,.06));backdrop-filter:blur(18px);border-radius:28px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.35);overflow:auto}.logo{width:118px;height:118px;object-fit:contain;background:white;border-radius:28px;padding:8px;display:block;margin:0 auto 12px;box-shadow:0 14px 40px rgba(0,0,0,.28)}.school{text-align:center;font-weight:900;font-size:20px;line-height:1.6}.year{text-align:center;color:var(--gold);font-weight:800;margin:6px 0 16px}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.1);padding:8px 12px;border-radius:999px;margin:4px;font-size:13px}.nameBox{margin:14px 0;padding:12px;border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14)}.nameBox input{width:100%;margin-top:8px;border:0;outline:0;border-radius:16px;padding:13px;background:rgba(255,255,255,.93);color:#111;text-align:right}.stat{display:grid;grid-template-columns:1fr auto;gap:10px;margin:9px 0;padding:12px;border-radius:18px;background:rgba(0,0,0,.18)}.stat b{color:var(--gold)}.progress{height:14px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin:10px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#fff2a6);border-radius:999px;transition:.45s}.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.badge{padding:7px 10px;border-radius:999px;background:rgba(216,180,91,.16);border:1px solid rgba(216,180,91,.55);color:#ffe8a3;font-weight:800;font-size:12px}.feed{height:100%;overflow-y:auto;scroll-snap-type:y mandatory;border-radius:30px;scroll-behavior:smooth;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.feed::-webkit-scrollbar{width:0}.card{min-height:calc(100vh - 28px);scroll-snap-align:start;display:flex;align-items:center;justify-content:center;padding:24px}.panel{width:min(880px,100%);min-height:78vh;border:1px solid rgba(255,255,255,.2);background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.07));backdrop-filter:blur(22px);border-radius:34px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.28);position:relative;overflow:hidden}.unit{display:inline-block;background:rgba(138,21,56,.72);border:1px solid rgba(255,255,255,.16);padding:8px 14px;border-radius:999px;color:#fff;font-weight:900}h1,h2{margin:16px 0 10px}h1{font-size:clamp(30px,5vw,58px)}h2{font-size:clamp(24px,3vw,40px)}.prompt{font-size:clamp(20px,2.4vw,31px);line-height:1.7;font-weight:900;margin:18px 0}.sub{color:var(--muted);line-height:1.8;font-size:16px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn{border:0;border-radius:18px;padding:13px 18px;color:white;background:linear-gradient(135deg,var(--maroon),#b01c4d);box-shadow:0 10px 22px rgba(0,0,0,.25);font-weight:900}.btn.alt{background:linear-gradient(135deg,var(--navy2),#123c78)}.btn.gold{background:linear-gradient(135deg,#b8882e,var(--gold));color:#1f1605}.btn.ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}.options{display:grid;gap:12px;margin:18px 0}.option{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);border-radius:20px;padding:16px;line-height:1.6;color:white;text-align:right;transition:.2s}.option:hover{transform:translateY(-3px);border-color:var(--gold)}.option.selected{background:rgba(216,180,91,.22);border-color:var(--gold)}.answerBox{width:100%;min-height:120px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.92);color:#111;border-radius:22px;padding:16px;outline:0;text-align:right;line-height:1.8}.fillInput{width:100%;border:0;outline:0;border-radius:18px;padding:15px;background:white;color:#111;text-align:right;margin:10px 0}.feedback{margin-top:14px;padding:14px;border-radius:20px;display:none;line-height:1.7;font-weight:800}.feedback.ok{display:block;background:rgba(31,210,135,.14);border:1px solid rgba(31,210,135,.55)}.feedback.bad{display:block;background:rgba(255,71,102,.14);border:1px solid rgba(255,71,102,.55)}.dropGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}.chip{padding:10px 12px;border-radius:14px;background:rgba(216,180,91,.22);border:1px solid rgba(216,180,91,.6);font-weight:900;user-select:none;cursor:grab}.drop{min-height:54px;padding:10px;border:1px dashed rgba(255,255,255,.4);border-radius:16px;background:rgba(0,0,0,.16)}.drop.active{border-color:var(--gold);background:rgba(216,180,91,.14)}.pairBox{padding:12px;border-radius:18px;background:rgba(255,255,255,.1);margin-bottom:8px}.matchRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;margin:10px 0}select{width:100%;border:0;border-radius:14px;padding:12px;background:#fff;color:#111}.orderItem{padding:13px;border-radius:16px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);margin:8px 0;cursor:grab}.orderItem.dragging{opacity:.45}.flash{min-height:260px;display:grid;place-items:center;text-align:center;border-radius:26px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:24px;font-size:26px;font-weight:900;line-height:1.8}.timer{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin:8px 0 12px}.timer span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#fff,var(--gold));transform-origin:right}.leader{margin-top:12px;max-height:180px;overflow:auto}.leadrow{display:flex;justify-content:space-between;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.18);margin:6px 0}.cert{background:white;color:#101322;border:10px solid var(--gold);border-radius:28px;padding:28px;text-align:center;line-height:1.9}.cert img{width:95px;height:95px;object-fit:contain}.navArrows{position:fixed;left:26px;bottom:24px;display:flex;gap:9px;z-index:5}.round{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.13);color:white;font-size:22px}.mobileMenu{display:none;position:fixed;right:18px;bottom:24px;z-index:8}@media(max-width:900px){.app{grid-template-columns:1fr;padding:0}.side{position:fixed;top:10px;right:10px;left:10px;z-index:6;max-height:190px;border-radius:22px;padding:10px;display:none}.side.open{display:block}.feed{border-radius:0}.card{min-height:100vh;padding:14px}.panel{min-height:86vh;border-radius:26px;padding:20px}.dropGrid,.matchRow{grid-template-columns:1fr}.mobileMenu{display:block!important}}

const STORE = 'shahaniya_grade12_quiz_fixed_v4';
const $ = s => document.querySelector(s);
const feed = $('#feed');
let state = loadState();
function loadState(){try{return JSON.parse(localStorage.getItem(STORE))||{answers:{},checked:{},xp:0,badges:[],timers:{},student:''}}catch(e){return {answers:{},checked:{},xp:0,badges:[],timers:{},student:''}}}
function saveState(){const n=$('#studentName'); if(n) state.student=n.value; localStorage.setItem(STORE,JSON.stringify(state));}
function norm(t){return String(t||'').toLowerCase().replace(/[إأآا]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي').replace(/[ًٌٍَُِّْـ.,،؛:()\[\]{}!؟?"']/g,'').trim();}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function render(){feed.innerHTML=introCard()+QUESTIONS.map((q,i)=>card(q,i)).join('')+finalCard();$('#studentName').value=state.student||'';bind();updateStats();renderLeaders();restoreAnswers();}
function introCard(){return `<section class="card" id="intro"><div class="panel"><span class="unit">اختبار تفاعلي شامل</span><h1>مراجعة الصف الثاني عشر</h1><p class="prompt">الوحدة الأولى: البيانات الضخمة وذكاء الأعمال<br>الوحدة الثانية: نشر الأعمال المكتبية</p><p class="sub">اسحب للأعلى للانتقال بين بطاقات الأسئلة. أجب لتحصل على نقاط XP وشارات رقمية، وفي النهاية ستحصل على شهادة إنجاز تلقائية.</p><div class="actions"><button class="btn gold" onclick="go(1)">ابدأ الآن 🚀</button><button class="btn alt" onclick="toggleSound()" id="soundBtn">الصوت: تشغيل 🔊</button></div></div></section>`}
function card(q,i){let body='';if(q.type==='mcq'||q.type==='speed')body=optionBody(q,i);if(q.type==='tf')body=`<div class="options"><button class="option" data-i="${i}" data-val="true">صح</button><button class="option" data-i="${i}" data-val="false">خطأ</button></div><button class="btn gold check" data-i="${i}">تحقق</button>`;if(q.type==='fill')body=`<input class="fillInput" id="ans${i}" placeholder="اكتب الإجابة هنا"><button class="btn gold check" data-i="${i}">تحقق</button>`;if(['define','mention','compare'].includes(q.type))body=`${q.type==='compare'?`<div class="pill">${q.left}</div><div class="pill">${q.right}</div>`:''}<textarea class="answerBox" id="ans${i}" placeholder="اكتب إجابتك هنا"></textarea><button class="btn gold check" data-i="${i}">تحقق</button>`;if(q.type==='matching')body=matchingBody(q,i);if(q.type==='dragdrop')body=dragBody(q,i);if(q.type==='ordering')body=orderBody(q,i);if(q.type==='flash')body=`<div class="flash" id="flash${i}">${escapeHtml(q.front)}</div><div class="actions"><button class="btn alt" onclick="flipFlash(${i})">اقلب البطاقة</button><button class="btn gold" onclick="markFlash(${i})">فهمت ✅</button></div>`;let timer=q.type==='speed'?`<div class="timer"><span id="timer${i}"></span></div><div class="sub">تحدي سرعة: لديك ${q.time||10} ثانية.</div>`:'';return `<section class="card" id="q${i}"><div class="panel"><span class="unit">${escapeHtml(q.unit)} · سؤال ${i+1} من ${QUESTIONS.length}</span><h2>${escapeHtml(q.title)}</h2>${timer}<div class="prompt">${escapeHtml(q.prompt)}</div>${body}<div class="feedback" id="fb${i}"></div><div class="actions"><button class="btn ghost" onclick="go(${i})">السابق</button><button class="btn alt" onclick="go(${i+2})">التالي</button></div></div></section>`}
function optionBody(q,i){return `<div class="options">${q.options.map((o,k)=>`<button class="option" data-i="${i}" data-val="${k}">${escapeHtml(o)}</button>`).join('')}</div><button class="btn gold check" data-i="${i}">تحقق</button>`}
function matchingBody(q,i){let defs=shuffle(q.pairs.map(p=>p[1]));return `<div>${q.pairs.map((p,k)=>`<div class="matchRow"><b>${escapeHtml(p[0])}</b><select id="m${i}_${k}"><option value="">اختر التعريف</option>${defs.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('')}</select></div>`).join('')}</div><button class="btn gold check" data-i="${i}">تحقق</button>`}
function dragBody(q,i){let terms=shuffle(q.pairs.map(p=>p[0]));return `<div class="chips">${terms.map(t=>`<span class="chip" draggable="true" data-term="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('')}</div><div class="dropGrid">${q.pairs.map((p,k)=>`<div class="pairBox"><div>${escapeHtml(p[1])}</div><div class="drop" data-i="${i}" data-accept="${escapeHtml(p[0])}" id="d${i}_${k}">ضع المصطلح هنا</div></div>`).join('')}</div><button class="btn gold check" data-i="${i}">تحقق</button>`}
function orderBody(q,i){let arr=shuffle(q.items);return `<div id="order${i}">${arr.map(x=>`<div class="orderItem" draggable="true">${escapeHtml(x)}</div>`).join('')}</div><div class="sub">اسحب العناصر للأعلى أو للأسفل حتى يصبح الترتيب صحيحًا.</div><button class="btn gold check" data-i="${i}">تحقق</button>`}
function finalCard(){return `<section class="card" id="final"><div class="panel"><span class="unit">النهاية</span><h2>النتيجة النهائية وشهادة الإنجاز</h2><p class="prompt">أحسنت! يمكنك عرض الشهادة وحفظ نتيجتك في لوحة الصدارة المحلية.</p><div id="finalStats" class="sub"></div><div class="actions"><button class="btn gold" onclick="showCertificate()">عرض شهادة الإنجاز 🏆</button><button class="btn alt" onclick="saveLeader()">حفظ في لوحة الصدارة</button><button class="btn ghost" onclick="window.print()">طباعة / حفظ PDF</button></div><div id="certificateWrap" style="margin-top:18px"></div></div></section>`}
function bind(){document.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',e=>{let i=e.currentTarget.dataset.i;document.querySelectorAll(`.option[data-i="${i}"]`).forEach(b=>b.classList.remove('selected'));e.currentTarget.classList.add('selected');state.answers[i]=e.currentTarget.dataset.val;saveState();}));document.querySelectorAll('.check').forEach(b=>b.addEventListener('click',()=>check(+b.dataset.i)));document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',ch.dataset.term)));document.querySelectorAll('.drop').forEach(d=>{d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('active')});d.addEventListener('dragleave',()=>d.classList.remove('active'));d.addEventListener('drop',e=>{e.preventDefault();d.classList.remove('active');let term=e.dataTransfer.getData('text/plain');d.textContent=term;d.dataset.term=term;saveDropAnswer(d);});});bindOrdering();$('#studentName').addEventListener('input',saveState);$('#resetBtn').addEventListener('click',resetQuiz);$('#certBtn').addEventListener('click',()=>{go(QUESTIONS.length+1);setTimeout(showCertificate,250)});$('#menuBtn').addEventListener('click',()=>$('#side').classList.toggle('open'));$('#upBtn').addEventListener('click',()=>go(currentIndex()-1));$('#downBtn').addEventListener('click',()=>go(currentIndex()+1));feed.addEventListener('scroll',onScroll,{passive:true});}
function bindOrdering(){document.querySelectorAll('[id^="order"]').forEach(list=>{let drag=null;list.querySelectorAll('.orderItem').forEach(item=>{item.addEventListener('dragstart',()=>{drag=item;item.classList.add('dragging')});item.addEventListener('dragend',()=>{item.classList.remove('dragging');drag=null})});list.addEventListener('dragover',e=>{e.preventDefault();const after=[...list.querySelectorAll('.orderItem:not(.dragging)')].find(el=>e.clientY<el.getBoundingClientRect().top+el.offsetHeight/2);if(drag){if(after)list.insertBefore(drag,after);else list.appendChild(drag);}});});}
function saveDropAnswer(d){let i=d.dataset.i;state.answers[i]=[...document.querySelectorAll(`.drop[data-i="${i}"]`)].map(x=>x.dataset.term||'');saveState();}
function check(i){let q=QUESTIONS[i],ok=false,ans=state.answers[i];if(q.type==='mcq'||q.type==='speed')ok=Number(ans)===q.answer;else if(q.type==='tf')ok=String(ans)===String(q.answer);else if(q.type==='fill'){let v=norm($('#ans'+i).value);let arr=[q.answer,...(q.alts||[])].map(norm);ok=arr.includes(v);state.answers[i]=$('#ans'+i).value;}else if(['define','mention','compare'].includes(q.type)){let txt=norm($('#ans'+i).value);let hit=(q.keywords||[]).filter(k=>txt.includes(norm(k))).length;ok=hit>=(q.min||2);state.answers[i]=$('#ans'+i).value;}else if(q.type==='matching'){ok=q.pairs.every((p,k)=>document.getElementById(`m${i}_${k}`).value===p[1]);state.answers[i]=q.pairs.map((p,k)=>document.getElementById(`m${i}_${k}`).value);}else if(q.type==='dragdrop'){ok=q.pairs.every((p,k)=>(document.getElementById(`d${i}_${k}`).dataset.term||'')===p[0]);state.answers[i]=q.pairs.map((p,k)=>document.getElementById(`d${i}_${k}`).dataset.term||'');}else if(q.type==='ordering'){let vals=[...document.querySelectorAll(`#order${i} .orderItem`)].map(x=>x.textContent.trim());ok=q.items.every((x,k)=>vals[k]===x);state.answers[i]=vals;}else if(q.type==='flash')ok=true;grade(i,ok,q.why);saveState();updateStats();}
function grade(i,ok,why){let was=state.checked[i];if(!was){state.checked[i]=ok?'ok':'bad';state.xp+=(ok?(QUESTIONS[i].type==='speed'?25:15):3);addBadges();}else{state.checked[i]=ok?'ok':'bad';}showFb(i,ok,why);beep(ok);}
function showFb(i,ok,msg){let fb=$('#fb'+i);if(!fb)return;fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=(ok?'✅ إجابة صحيحة':'❌ تحتاج إلى مراجعة')+'<br>'+escapeHtml(msg||'');}
let soundOn=true,audioCtx=null;function toggleSound(){soundOn=!soundOn;$('#soundBtn').textContent='الصوت: '+(soundOn?'تشغيل 🔊':'إيقاف 🔇')}
function beep(ok){if(!soundOn)return;try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=ok?780:180;g.gain.value=.05;o.connect(g);g.connect(audioCtx.destination);o.start();setTimeout(()=>o.stop(),140)}catch(e){}}
function addBadges(){let done=Object.keys(state.checked).length;let xp=state.xp||0;[['بداية قوية',1],['مستكشف البيانات',8],['خبير النماذج',16],['محترف Solver',24],['بطل المراجعة',QUESTIONS.length]].forEach(b=>{if(done>=b[1]&&!state.badges.includes(b[0]))state.badges.push(b[0])});if(xp>=300&&!state.badges.includes('نجم XP'))state.badges.push('نجم XP');}
function updateStats(){let done=Object.keys(state.checked).length;let correct=Object.values(state.checked).filter(x=>x==='ok').length;let pct=QUESTIONS.length?Math.round(correct/QUESTIONS.length*100):0;$('#xp').textContent=state.xp||0;$('#done').textContent=`${done} / ${QUESTIONS.length}`;$('#percent').textContent=pct+'%';$('#bar').style.width=(done/QUESTIONS.length*100)+'%';$('#badges').innerHTML=(state.badges||[]).map(b=>`<span class="badge">🏅 ${escapeHtml(b)}</span>`).join('');let fs=$('#finalStats');if(fs)fs.innerHTML=`الإجابات الصحيحة: <b>${correct}</b> من <b>${QUESTIONS.length}</b> — النسبة: <b>${pct}%</b> — XP: <b>${state.xp||0}</b>`;}
function restoreAnswers(){Object.entries(state.answers||{}).forEach(([i,a])=>{let q=QUESTIONS[i];if(!q)return;if(['mcq','speed','tf'].includes(q.type)){let b=document.querySelector(`.option[data-i="${i}"][data-val="${a}"]`);if(b)b.classList.add('selected');}else if(['fill','define','mention','compare'].includes(q.type)){let el=$('#ans'+i);if(el)el.value=a;}else if(q.type==='matching'&&Array.isArray(a)){a.forEach((v,k)=>{let el=document.getElementById(`m${i}_${k}`);if(el)el.value=v;})}else if(q.type==='dragdrop'&&Array.isArray(a)){a.forEach((v,k)=>{let el=document.getElementById(`d${i}_${k}`);if(el&&v){el.textContent=v;el.dataset.term=v;}})}});Object.entries(state.checked||{}).forEach(([i,v])=>showFb(+i,v==='ok',QUESTIONS[i]?.why));}
function currentIndex(){let cards=[...document.querySelectorAll('.card')];let top=feed.getBoundingClientRect().top;let best=0,dist=999999;cards.forEach((c,i)=>{let d=Math.abs(c.getBoundingClientRect().top-top);if(d<dist){dist=d;best=i}});return best;}
function go(n){let cards=[...document.querySelectorAll('.card')];n=Math.max(0,Math.min(cards.length-1,n));cards[n].scrollIntoView({behavior:'smooth',block:'start'});}
function onScroll(){let idx=currentIndex();let card=document.querySelectorAll('.card')[idx];if(!card||!card.id.startsWith('q'))return;let i=+card.id.slice(1),q=QUESTIONS[i];if(q.type==='speed'&&!state.timers[i])startTimer(i,q.time||10);}
function startTimer(i,sec){state.timers[i]=Date.now();saveState();let el=$('#timer'+i);if(!el)return;el.style.transition=`transform ${sec}s linear`;requestAnimationFrame(()=>el.style.transform='scaleX(0)');setTimeout(()=>{if(!state.checked[i])showFb(i,false,'انتهى وقت التحدي، ويمكنك الإجابة للتدريب.')},sec*1000);}
function flipFlash(i){let el=$('#flash'+i),q=QUESTIONS[i];el.dataset.flip=el.dataset.flip==='1'?'0':'1';el.textContent=el.dataset.flip==='1'?q.back:q.front;}
function markFlash(i){grade(i,true,QUESTIONS[i].why);saveState();updateStats();}
function resetQuiz(){if(confirm('هل تريد إعادة الاختبار ومسح التقدم؟')){localStorage.removeItem(STORE);state=loadState();render();go(0);}}
function showCertificate(){let name=$('#studentName').value.trim()||'الطالب';let correct=Object.values(state.checked).filter(x=>x==='ok').length;let pct=Math.round(correct/QUESTIONS.length*100);let pass=pct>=60?'ناجح':'بحاجة إلى مراجعة';let date=new Date().toLocaleDateString('ar-QA');$('#certificateWrap').innerHTML=`<div class="cert"><img src="${LOGO}"><h2>شهادة إنجاز</h2><p>تُمنح هذه الشهادة إلى</p><h1>${escapeHtml(name)}</h1><p>لإتمام اختبار مراجعة الصف الثاني عشر بنجاح</p><p>الدرجة: <b>${correct} / ${QUESTIONS.length}</b> — النسبة: <b>${pct}%</b> — الحالة: <b>${pass}</b></p><p>تاريخ الإنجاز: ${date}</p><h3>مدرسة الشحانية الإعدادية الثانوية للبنين</h3><p>العام الدراسي 2025-2026</p></div>`;}
function saveLeader(){let name=$('#studentName').value.trim()||'طالب بدون اسم';let correct=Object.values(state.checked).filter(x=>x==='ok').length;let pct=Math.round(correct/QUESTIONS.length*100);let arr=JSON.parse(localStorage.getItem(STORE+'_leaders')||'[]');arr.push({name,pct,xp:state.xp||0,date:new Date().toLocaleDateString('ar-QA')});arr.sort((a,b)=>b.pct-a.pct||b.xp-a.xp);arr=arr.slice(0,10);localStorage.setItem(STORE+'_leaders',JSON.stringify(arr));renderLeaders();alert('تم حفظ النتيجة في لوحة الصدارة المحلية.');}
function renderLeaders(){let arr=JSON.parse(localStorage.getItem(STORE+'_leaders')||'[]');$('#leaders').innerHTML=arr.length?arr.map((x,i)=>`<div class="leadrow"><span>${i+1}. ${escapeHtml(x.name)}</span><b>${x.pct}% · ${x.xp}XP</b></div>`).join(''):'<div class="sub">لا توجد نتائج محفوظة بعد.</div>';}
render();
</script></body></html>
