<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة مباريات المنتخبات العربية في كأس العالم</title>
<style>
:root{--bg:#080b18;--card:rgba(255,255,255,.09);--card2:rgba(255,255,255,.14);--gold:#f4c95d;--maroon:#8a1538;--text:#fff;--muted:#cfd6e6;--green:#1fc77a;--red:#ff5871;--line:rgba(255,255,255,.16)}
*{box-sizing:border-box}body{margin:0;font-family:"Tajawal","Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top right,#53102d 0,#111832 38%,#060812 100%);color:var(--text);min-height:100vh}body:before{content:"";position:fixed;inset:0;background:linear-gradient(120deg,rgba(244,201,93,.12),transparent 35%,rgba(138,21,56,.18));pointer-events:none}.wrap{width:min(1240px,94vw);margin:auto;padding:24px 0 42px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:stretch}.panel{background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.06));border:1px solid var(--line);border-radius:28px;box-shadow:0 22px 70px rgba(0,0,0,.35);backdrop-filter:blur(16px);overflow:hidden}.headline{padding:30px}.kicker{color:var(--gold);font-weight:800;letter-spacing:.5px}.headline h1{font-size:clamp(30px,5vw,58px);line-height:1.08;margin:10px 0 12px}.headline p{color:var(--muted);font-size:18px;margin:0}.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:18px}.mini{padding:18px;border-radius:22px;background:rgba(255,255,255,.09);border:1px solid var(--line)}.mini b{display:block;font-size:28px;color:var(--gold)}.toolbar{margin:18px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.search,.select,.btn{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.1);color:#fff;padding:12px 14px;font-weight:800;outline:none}.search{flex:1;min-width:250px}.select option{color:#111}.btn{cursor:pointer;background:linear-gradient(135deg,var(--maroon),#b62652);box-shadow:0 10px 24px rgba(138,21,56,.35)}.btn.secondary{background:rgba(255,255,255,.1)}.tabs{display:flex;gap:9px;flex-wrap:wrap;margin:16px 0}.tab{padding:11px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-weight:900}.tab.active{background:linear-gradient(135deg,var(--gold),#fff0aa);color:#241300}.section{display:none}.section.active{display:block}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px}.match{padding:18px;border-radius:26px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.06));border:1px solid var(--line);box-shadow:0 18px 44px rgba(0,0,0,.25)}.meta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}.badge{color:#120b00;background:linear-gradient(135deg,var(--gold),#fff3b0);padding:5px 10px;border-radius:999px;font-weight:900}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:18px 0}.team{font-size:20px;font-weight:1000;display:flex;align-items:center;gap:8px}.team.away{justify-content:flex-start}.flag{width:31px;height:22px;border-radius:5px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.35)}.emoji{font-size:27px;line-height:1}.score{display:flex;gap:6px;align-items:center;background:#060812;border-radius:16px;padding:8px}.score input{width:52px;text-align:center;font-size:21px;font-weight:900;border:1px solid var(--line);border-radius:10px;background:#fff;color:#111;padding:6px}.vs{color:var(--gold);font-weight:1000}.prob{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.prob label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.prob input{width:100%;border-radius:10px;border:1px solid var(--line);padding:7px;background:rgba(255,255,255,.9);font-weight:900;text-align:center}.bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:9px 0}.bar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#fff3a0)}.actions{display:flex;gap:8px;margin-top:12px}.tablewrap{overflow:auto;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.07)}table{width:100%;border-collapse:collapse;min-width:820px}th,td{padding:13px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}th{background:rgba(244,201,93,.16);color:var(--gold)}td.teamcell{text-align:right;font-weight:1000;display:flex;align-items:center;gap:8px}.groupbox{margin-bottom:20px}.groupbox h2{display:flex;align-items:center;gap:10px;margin:24px 0 10px;color:var(--gold)}.note{padding:14px 16px;border-radius:18px;background:rgba(244,201,93,.12);border:1px solid rgba(244,201,93,.35);color:#fff;margin:14px 0}.empty{padding:30px;text-align:center;color:var(--muted)}@media(max-width:760px){.hero{grid-template-columns:1fr}.teams{grid-template-columns:1fr}.score{justify-content:center}.prob{grid-template-columns:1fr}.toolbar{display:grid}.search{min-width:0}.headline{padding:22px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <section class="panel headline">
      <div class="kicker">World Cup 2026</div>
      <h1>لوحة مباريات المنتخبات العربية</h1>
      <p>جدول مبني حسب الصورة المرفقة، مع مجموعات مصححة، أعلام، إدخال يدوي للنتائج، احتمالات، وترتيب تلقائي.</p>
    </section>
    <section class="panel statgrid">
      <div class="mini"><span>مباريات</span><b id="totalMatches">0</b></div>
      <div class="mini"><span>منتخبات عربية</span><b id="arabCount">8</b></div>
      <div class="mini"><span>نتائج مدخلة</span><b id="doneCount">0</b></div>
      <div class="mini"><span>المباراة القادمة</span><b id="nextMatch">—</b></div>
    </section>
  </div>

  <div class="toolbar">
    <input class="search" id="search" placeholder="بحث: قطر، الجزائر، المجموعة السابعة..." accesskey="/">
    <select class="select" id="groupFilter"><option value="all">كل المجموعات</option></select>
    <select class="select" id="statusFilter"><option value="all">كل الحالات</option><option value="done">نتائج مدخلة</option><option value="pending">لم تُدخل النتيجة</option></select>
    <button class="btn secondary" id="resetBtn">إعادة ضبط النتائج</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="matchesSec">المباريات</button>
    <button class="tab" data-tab="arabSec">إحصاءات المنتخبات العربية</button>
    <button class="tab" data-tab="groupsSec">ترتيب المجموعات</button>
  </div>

  <section id="matchesSec" class="section active"><div id="matches" class="cards"></div></section>
  <section id="arabSec" class="section"><div class="tablewrap"><table id="arabTable"></table></div></section>
  <section id="groupsSec" class="section"><div id="groups"></div></section>
</div>

<script>
const FLAGS={
"قطر":["qa","🇶🇦"],"سويسرا":["ch","🇨🇭"],"كندا":["ca","🇨🇦"],"البوسنة والهرسك":["ba","🇧🇦"],
"المغرب":["ma","🇲🇦"],"البرازيل":["br","🇧🇷"],"إسكندنافيا":["","🌍"],"هايتي":["ht","🇭🇹"],
"تونس":["tn","🇹🇳"],"السويد":["se","🇸🇪"],"اليابان":["jp","🇯🇵"],"هولندا":["nl","🇳🇱"],
"مصر":["eg","🇪🇬"],"بلجيكا":["be","🇧🇪"],"نيوزيلندا":["nz","🇳🇿"],"إيران":["ir","🇮🇷"],
"السعودية":["sa","🇸🇦"],"أوروغواي":["uy","🇺🇾"],"إسبانيا":["es","🇪🇸"],"الرأس الأخضر":["cv","🇨🇻"],
"العراق":["iq","🇮🇶"],"النرويج":["no","🇳🇴"],"فرنسا":["fr","🇫🇷"],"السنغال":["sn","🇸🇳"],
"الجزائر":["dz","🇩🇿"],"الأردن":["jo","🇯🇴"],"الأرجنتين":["ar","🇦🇷"],"النمسا":["at","🇦🇹"]
};
const ARABS=["قطر","المغرب","تونس","مصر","السعودية","العراق","الجزائر","الأردن"];
const GROUPS={
"المجموعة الأولى":["قطر","سويسرا","كندا","البوسنة والهرسك"],
"المجموعة الثانية":["المغرب","البرازيل","إسكندنافيا","هايتي"],
"المجموعة الثالثة":["تونس","السويد","اليابان","هولندا"],
"المجموعة الرابعة":["مصر","بلجيكا","نيوزيلندا","إيران"],
"المجموعة الخامسة":["السعودية","أوروغواي","إسبانيا","الرأس الأخضر"],
"المجموعة السادسة":["العراق","النرويج","فرنسا","السنغال"],
"المجموعة السابعة":["الجزائر","الأردن","الأرجنتين","النمسا"]
};
const baseMatches=[
{id:1,g:"المجموعة الأولى",h:"قطر",a:"سويسرا",d:"2026-06-14",t:"23:00",p:[30,30,40]},
{id:2,g:"المجموعة الثانية",h:"المغرب",a:"البرازيل",d:"2026-06-15",t:"02:00",p:[18,24,58]},
{id:3,g:"المجموعة الثالثة",h:"تونس",a:"السويد",d:"2026-06-16",t:"06:00",p:[26,31,43]},
{id:4,g:"المجموعة الرابعة",h:"مصر",a:"بلجيكا",d:"2026-06-16",t:"23:00",p:[25,29,46]},
{id:5,g:"المجموعة الخامسة",h:"السعودية",a:"أوروغواي",d:"2026-06-18",t:"02:00",p:[24,28,48]},
{id:6,g:"المجموعة السادسة",h:"العراق",a:"النرويج",d:"2026-06-18",t:"23:00",p:[28,30,42]},
{id:7,g:"المجموعة السابعة",h:"الجزائر",a:"الأرجنتين",d:"2026-06-19",t:"05:00",p:[16,23,61]},
{id:8,g:"المجموعة السابعة",h:"الأردن",a:"النمسا",d:"2026-06-20",t:"08:00",p:[22,29,49]},
{id:9,g:"المجموعة الأولى",h:"قطر",a:"كندا",d:"2026-06-22",t:"02:00",p:[34,31,35]},
{id:10,g:"المجموعة الثانية",h:"المغرب",a:"إسكندنافيا",d:"2026-06-22",t:"02:00",p:[47,30,23]},
{id:11,g:"المجموعة الثالثة",h:"تونس",a:"اليابان",d:"2026-06-23",t:"08:00",p:[25,29,46]},
{id:12,g:"المجموعة الخامسة",h:"السعودية",a:"إسبانيا",d:"2026-06-24",t:"03:00",p:[18,24,58]},
{id:13,g:"المجموعة الرابعة",h:"مصر",a:"نيوزيلندا",d:"2026-06-25",t:"05:00",p:[52,28,20]},
{id:14,g:"المجموعة السادسة",h:"العراق",a:"فرنسا",d:"2026-06-26",t:"02:00",p:[15,23,62]},
{id:15,g:"المجموعة السابعة",h:"الجزائر",a:"الأردن",d:"2026-06-27",t:"08:00",p:[45,31,24]},
{id:16,g:"المجموعة الأولى",h:"قطر",a:"البوسنة والهرسك",d:"2026-06-28",t:"03:00",p:[38,31,31]},
{id:17,g:"المجموعة الثانية",h:"المغرب",a:"هايتي",d:"2026-06-29",t:"03:00",p:[58,25,17]},
{id:18,g:"المجموعة الثالثة",h:"تونس",a:"هولندا",d:"2026-06-30",t:"05:00",p:[19,25,56]},
{id:19,g:"المجموعة السادسة",h:"العراق",a:"السنغال",d:"2026-07-01",t:"23:00",p:[31,31,38]},
{id:20,g:"المجموعة الخامسة",h:"السعودية",a:"الرأس الأخضر",d:"2026-07-02",t:"02:00",p:[49,29,22]},
{id:21,g:"المجموعة الرابعة",h:"مصر",a:"إيران",d:"2026-07-03",t:"05:00",p:[39,31,30]},
{id:22,g:"المجموعة السابعة",h:"الأردن",a:"الأرجنتين",d:"2026-07-04",t:"03:00",p:[12,20,68]},
{id:23,g:"المجموعة السابعة",h:"الجزائر",a:"النمسا",d:"2026-07-05",t:"06:00",p:[34,31,35]}
];
let matches=JSON.parse(localStorage.getItem('arab_wc_verified_results')||'null')||structuredClone(baseMatches);
function save(){localStorage.setItem('arab_wc_verified_results',JSON.stringify(matches))}
function flag(name){const f=FLAGS[name]||["","🏳️"];return f[0]?`<img class="flag" src="https://flagcdn.com/w40/${f[0]}.png" onerror="this.outerHTML='<span class=emoji>${f[1]}</span>'" alt="${name}">`:`<span class="emoji">${f[1]}</span>`}
function day(d){return new Intl.DateTimeFormat('ar-QA',{weekday:'long'}).format(new Date(d+'T12:00:00'))}
function fdate(d){return new Intl.DateTimeFormat('ar-QA',{day:'2-digit',month:'long'}).format(new Date(d+'T12:00:00'))}
function isDone(m){return Number.isFinite(+m.hs)&&Number.isFinite(+m.as)&&m.hs!==''&&m.as!==''}
function stats(){const s={};Object.values(GROUPS).flat().forEach(t=>s[t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});matches.forEach(m=>{if(!isDone(m))return;let H=s[m.h],A=s[m.a],hs=+m.hs,as=+m.as;H.p++;A.p++;H.gf+=hs;H.ga+=as;A.gf+=as;A.ga+=hs;if(hs>as){H.w++;A.l++;H.pts+=3}else if(hs<as){A.w++;H.l++;A.pts+=3}else{H.d++;A.d++;H.pts++;A.pts++}});Object.values(s).forEach(x=>x.gd=x.gf-x.ga);return s}
function sorted(arr,s){return arr.map(t=>s[t]).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team,'ar'))}
function tableRows(arr){return arr.map((x,i)=>`<tr><td>${i+1}</td><td class="teamcell">${flag(x.team)} ${x.team}</td><td>${x.p}</td><td>${x.w}</td><td>${x.d}</td><td>${x.l}</td><td>${x.gf}</td><td>${x.ga}</td><td>${x.gd}</td><td><b>${x.pts}</b></td></tr>`).join('')}
function tableHead(){return `<tr><th>#</th><th>المنتخب</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>الفارق</th><th>النقاط</th></tr>`}
function renderMatches(){const q=search.value.trim();const gf=groupFilter.value;const sf=statusFilter.value;let data=matches.filter(m=>(gf==='all'||m.g===gf)&&(!q||JSON.stringify(m).includes(q))&&(sf==='all'||(sf==='done'?isDone(m):!isDone(m))));document.getElementById('matches').innerHTML=data.map(m=>`<article class="match" data-id="${m.id}"><div class="meta"><span class="badge">${m.g}</span><span>${day(m.d)} • ${fdate(m.d)} • ${m.t} بتوقيت قطر</span><span>${isDone(m)?'انتهت':'لم تبدأ'}</span></div><div class="teams"><div class="team">${flag(m.h)} ${m.h}</div><div class="score"><input class="hs" inputmode="numeric" value="${m.hs??''}" placeholder="0"><span class="vs">-</span><input class="as" inputmode="numeric" value="${m.as??''}" placeholder="0"></div><div class="team away">${flag(m.a)} ${m.a}</div></div><div class="prob"><div><label>فوز ${m.h}</label><input class="ph" type="number" value="${m.p[0]}" min="0" max="100"></div><div><label>تعادل</label><input class="pd" type="number" value="${m.p[1]}" min="0" max="100"></div><div><label>فوز ${m.a}</label><input class="pa" type="number" value="${m.p[2]}" min="0" max="100"></div></div><div class="bars"><div class="bar"><span style="width:${m.p[0]}%"></span></div><div class="bar"><span style="width:${m.p[1]}%"></span></div><div class="bar"><span style="width:${m.p[2]}%"></span></div></div><div class="actions"><button class="btn apply">اعتماد النتيجة</button><button class="btn secondary clear">مسح</button></div></article>`).join('')||'<div class="empty">لا توجد مباريات مطابقة.</div>';bindCards()}
function bindCards(){document.querySelectorAll('.match').forEach(card=>{const id=+card.dataset.id,m=matches.find(x=>x.id===id);function apply(){m.hs=card.querySelector('.hs').value;m.as=card.querySelector('.as').value;m.p=[+card.querySelector('.ph').value||0,+card.querySelector('.pd').value||0,+card.querySelector('.pa').value||0];save();render()}card.querySelector('.apply').onclick=apply;card.querySelector('.clear').onclick=()=>{delete m.hs;delete m.as;save();render()};card.querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')apply()}))})}
function renderTables(){const s=stats();document.getElementById('arabTable').innerHTML=tableHead()+tableRows(sorted(ARABS,s));document.getElementById('groups').innerHTML=Object.entries(GROUPS).map(([g,teams])=>`<div class="groupbox"><h2>🏆 ${g}</h2><div class="tablewrap"><table>${tableHead()}${tableRows(sorted(teams,s))}</table></div></div>`).join('')}
function renderSummary(){totalMatches.textContent=matches.length;doneCount.textContent=matches.filter(isDone).length;const upcoming=matches.find(m=>!isDone(m));nextMatch.textContent=upcoming?`${upcoming.h} × ${upcoming.a}`:'اكتملت النتائج'}
function render(){renderMatches();renderTables();renderSummary()}
Object.keys(GROUPS).forEach(g=>groupFilter.insertAdjacentHTML('beforeend',`<option>${g}</option>`));
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')});
search.oninput=renderMatches;groupFilter.onchange=renderMatches;statusFilter.onchange=renderMatches;resetBtn.onclick=()=>{if(confirm('هل تريد مسح كل النتائج والعودة للجدول الأصلي؟')){matches=structuredClone(baseMatches);save();render()}};
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();save();alert('تم حفظ البيانات محليًا')} if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();search.focus()} if(e.key==='Escape'){search.value='';renderMatches()}});
render();
</script>
</body>
</html>
