function badge(b){if(!S.badges.includes(b)){S.badges.push(b);toast('شارة جديدة: '+b)}}
function mark(i,ok,why,sample=''){if(S.ans[i])return;S.ans[i]={ok}; if(ok){S.cor++;S.xp+=100;sound(true)}else{S.xp+=20;sound(false)} if(S.cor>=5)badge('متألق'); if(S.cor>=15)badge('خبير النظام'); if(S.xp>=1000)badge('جامع XP'); let f=$('fb'+i);f.className='fb '+(ok?'goodtxt':'badtxt');f.innerHTML=(ok?'✅ صحيح':'❌ راجع الإجابة')+'<br>'+why+(sample?'<br><b>الإجابة النموذجية:</b> '+sample:'');stat(); if(Object.keys(S.ans).length===QS.length)setTimeout(final,800)}
function render(){ $('feed').innerHTML=QS.map((q,i)=>{let b=''; if(q.t==='mcq'){b+=`<div class="opts">${q.o.map((o,j)=>`<button class="opt" data-act="sel" data-i="${i}" data-j="${j}">${o}</button>`).join('')}</div>${q.speed?`<span class="pill">⏱️ ${q.speed} ثانية</span>`:''}<div class="row"><button class="btn" data-act="checkmcq" data-i="${i}">تحقق</button></div>`} if(q.t==='tf'){b+=`<div class="opts"><button class="opt" data-act="tf" data-i="${i}" data-v="true">صح</button><button class="opt" data-act="tf" data-i="${i}" data-v="false">خطأ</button></div>`} if(q.t==='text'||q.t==='fill'){b+=`<textarea id="txt${i}" placeholder="اكتب إجابتك هنا"></textarea><div class="row"><button class="btn" data-act="text" data-i="${i}">تحقق</button><button class="btn btn2" data-act="sample" data-i="${i}">الإجابة النموذجية</button></div>`} if(q.t==='match'){let rights=shuffle(q.p.map(x=>x[1])); b+=q.p.map((p,k)=>`<div class="pair"><div class="chip">${p[0]}</div><select id="m${i}_${k}"><option value="">اختر</option>${rights.map(r=>`<option value="${esc(r)}">${r}</option>`).join('')}</select></div>`).join('')+`<div class="row"><button class="btn" data-act="match" data-i="${i}">تحقق</button></div>`} if(q.t==='order'){b+=`<div id="ord${i}">${shuffle(q.it).map(x=>`<div class="ord" data-v="${esc(x)}"><span>${x}</span><span><button class="mini" data-act="up">▲</button><button class="mini" data-act="down">▼</button></span></div>`).join('')}</div><div class="row"><button class="btn" data-act="order" data-i="${i}">تحقق</button></div>`} if(q.t==='flash'){b+=`<div class="flash" id="fl${i}" data-act="flip" data-i="${i}">${q.front}</div><div class="row"><button class="btn" data-act="know" data-i="${i}">عرفتها ✅</button><button class="btn btn2" data-act="dont" data-i="${i}">أحتاج مراجعة</button></div>`} return `<section class="slide" id="q${i}"><div class="card"><span class="pill">${q.u}</span><div class="q"><b>${i+1}/${QS.length}</b> — ${q.q||q.front}</div>${b}<div id="fb${i}" class="fb hidden"></div><div class="row"><button class="btn btn2" data-act="next" data-i="${i}">السؤال التالي ⬆️</button><button class="btn btn2" data-act="finish">إنهاء</button></div></div></section>`}).join(''); stat(); setTimeout(()=>{let e=$('q'+S.i); if(e)e.scrollIntoView()},50)}
function start(resume=false){if(!resume){S={name:$('name').value.trim()||'طالب متميز',i:0,ans:{},xp:0,cor:0,badges:[],started:true}}$('start').classList.add('hidden');$('final').classList.add('hidden');$('feed').classList.remove('hidden');render();save()}
function final(){ $('feed').classList.add('hidden');$('final').classList.remove('hidden'); let pct=Math.round(S.cor/QS.length*100),date=new Date().toLocaleDateString('ar-QA'),pass=pct>=60?'ناجح':'بحاجة إلى مراجعة'; if(pct>=80)badge('بطل الاختبار'); $('res').innerHTML=`<div class="cert"><img src="${LOGO}"><h2>🏆 شهادة إنجاز</h2><h3>مدرسة الشحانية الإعدادية الثانوية للبنين</h3><p>تُمنح إلى الطالب/ة</p><h2>${esc(S.name)}</h2><p>لإتمام اختبار الحادي عشر في الحوسبة وتكنولوجيا المعلومات</p><h3>الدرجة: ${S.cor}/${QS.length} — النسبة: ${pct}% — ${pass}</h3><p>XP: ${S.xp} | تاريخ الإنجاز: ${date}</p><p>العام الدراسي 2025-2026</p></div><p>${S.badges.map(x=>'🏅 '+x).join(' &nbsp; ')}</p>`; let L=JSON.parse(localStorage.getItem('g11_lead')||'[]');L.push({n:S.name,p:pct,x:S.xp});L=L.sort((a,b)=>b.p-a.p||b.x-a.x).slice(0,10);localStorage.setItem('g11_lead',JSON.stringify(L));$('leaders').innerHTML=L.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.n)}</td><td>${r.p}%</td><td>${r.x}</td></tr>`).join('')}
document.addEventListener('click',e=>{let a=e.target.dataset.act;if(!a)return;let i=+e.target.dataset.i,q=QS[i]; if(a==='sel'){document.querySelectorAll(`[data-act="sel"][data-i="${i}"]`).forEach(x=>x.classList.remove('sel'));e.target.classList.add('sel')} if(a==='checkmcq'){let s=document.querySelector(`[data-act="sel"].sel[data-i="${i}"]`);if(!s)return toast('اختر إجابة');let j=+s.dataset.j;document.querySelectorAll(`[data-act="sel"][data-i="${i}"]`).forEach((x,k)=>{if(k===q.a)x.classList.add('good'); if(k===j&&k!==q.a)x.classList.add('bad')});mark(i,j===q.a,q.w)} if(a==='tf'){let v=e.target.dataset.v==='true';mark(i,v===q.a,q.w)} if(a==='text'){let t=$('txt'+i).value;if(!t.trim())return toast('اكتب إجابتك');let ok=false;if(q.t==='fill')ok=q.ans.some(x=>norm(t).includes(norm(x)));else{let c=0;q.k.forEach(k=>{if(norm(t).includes(norm(k)))c++});ok=c>=Math.min(4,Math.ceil(q.k.length*.45))}mark(i,ok,ok?'إجابتك تضمنت المفاهيم الأساسية.':'راجع الإجابة النموذجية.',q.s||(q.ans?q.ans.join(' / '):''))} if(a==='sample'){$('fb'+i).className='fb';$('fb'+i).innerHTML='<b>الإجابة النموذجية:</b> '+(q.s||(q.ans?q.ans.join(' / '):''))} if(a==='match'){let ok=true;q.p.forEach((p,k)=>{if($('m'+i+'_'+k).value!==p[1])ok=false});mark(i,ok,ok?'مطابقة صحيحة.':'توجد مطابقة غير صحيحة.',q.p.map(p=>p[0]+' ← '+p[1]).join(' | '))} if(a==='up'||a==='down'){let r=e.target.closest('.ord');if(a==='up'&&r.previousElementSibling)r.parentNode.insertBefore(r,r.previousElementSibling);if(a==='down'&&r.nextElementSibling)r.parentNode.insertBefore(r.nextElementSibling,r)} if(a==='order'){let vals=[...$('ord'+i).querySelectorAll('.ord')].map(x=>x.dataset.v);mark(i,vals.every((v,k)=>v===q.it[k]),'الترتيب الصحيح موضح في النموذج.',q.it.join(' ← '))} if(a==='flip'){let f=$('fl'+i);f.textContent=f.textContent===q.front?q.back:q.front} if(a==='know')mark(i,true,'تم احتساب بطاقة الفلاش.',q.back); if(a==='dont')mark(i,false,'راجع بطاقة الفلاش ثم أعد المحاولة لاحقاً.',q.back); if(a==='next'){S.i=Math.min(i+1,QS.length-1);save();$('q'+S.i).scrollIntoView({behavior:'smooth'})} if(a==='finish')final()});
$('startBtn').onclick=()=>start(false);$('resume').onclick=()=>{load();if(S.started){$('name').value=S.name;start(true)}else toast('لا يوجد تقدم محفوظ')};$('clear').onclick=()=>{localStorage.removeItem(key);toast('تم حذف الحفظ')};$('again').onclick=()=>{localStorage.removeItem(key);location.reload()};$('print').onclick=()=>print();$('feed').onscroll=()=>{let best=0,dist=1e9;document.querySelectorAll('.slide').forEach((x,i)=>{let d=Math.abs(x.getBoundingClientRect().top-150);if(d<dist){dist=d;best=i}});S.i=best;save()};load();stat();if(S.started)$('name').value=S.name;
</script></body></html>
